<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17</title>
</head>
<body style="background-color: #4e3372;">
    
<!-- 17) Escreva um programa para ler 2 valores inteiros e uma das seguintes operações a serem executadas 
    (codificada da seguinte forma: 1. Adição, 2.Subtração, 3.Divisão,  4.Multiplicação). 
    Calcular e escrever o resultado dessa operação sobre os dois valores lidos. Observação: Considere que só serão lidos os valores 1, 2, 3 ou 4. -->
    <form>
        
        <input type="number" id="v1" placeholder="Digite um valor" style="padding: 10px; margin-bottom: 10px; font-size: 18px;"> <br>
        <input type="number" id="v2" placeholder="Digite um valor" style="padding: 10px; margin-bottom: 10px; font-size: 18px;"> <br>
        <select name="opc3" id="operação" style="padding: 10px 30px; margin-bottom: 10px; font-size: 18px;"> <br>
            <option value="1">Adição</option>
            <option value="2">Subtração</option>
            <option value="3">Multiplicação</option>
            <option value="4">Divisão</option>
        </select> <br>
        <button type="button" onclick="mainController()" style="padding: 10px 30px; margin-bottom: 10px; font-size: 18px;">Calcular</button>
    </form>

    <h1 id="saida"></h1>
</body>

</html>

<script>
    function mainController() {
        var v1 = parseInt(document.getElementById("v1").value);
        var v2 = parseInt(document.getElementById("v2").value);
        var opc = parseInt(document.getElementById("operação").value);
        console.log(v1, v2, opc);
        document.getElementById("saida").innerHTML = "Resposta: " + calculo(v1, v2, opc);
    }

    function calculo(valor1 = 0, valor2 = 0, operacao = 0) {
        if (operacao == 1) {
            return valor1 + valor2;
        } else if (operacao == 2) {
            return valor1 - valor2;
        } else if (operacao == 3) {
            return valor1 * valor2
        }
        //else {
        return valor1 / valor2
            //}
    }
</script>
