<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 13</title>
</head>
<body style="background-color: #4e3372;">
    
<!-- 13) Escreva um programa para ler um número inteiro (considere que serão lidos apenas valores positivos e inteiros) e 
    escrever se é par ou ímpar. -->
    
    <form>
        <input type="number" id="numero" placeholder="Digite um Numero" style="padding: 10px; margin-bottom: 10px; font-size: 18px;"><br>
        <button type="button" onclick="mainController()" style="padding: 10px 30px; margin-bottom: 10px; font-size: 18px;">Ordenar</button>
    </form>

    <h1 id="saida" style="color: #000000; font-family: monospace;"></h1>

</body>
</html>



<script>
    function mainController() {
        var number = parseInt(document.getElementById("numero").value);
        document.getElementById('saida').innerHTML = parImpar(number);
    }

    function parImpar(x = 0) {
        if (x % 2 == 0) { // 5 / 2 = 2 resto 1 ou 6 / 2 = 3 resto 0
            return "PAR";
        } else {
            return "IMPAR";
        }
    }
</script>
