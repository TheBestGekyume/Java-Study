<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios</title>
</head>
<body style="background-color: #4e3372;">
    <!-- Escreva um programa para ler o raio de um círculo, calcular e escrever a sua área (Pi * (raio * raio)) -->

    <form>
        <input style="padding: 10px; margin-bottom: 10px; font-size: 18px;" type="text" id="raio" placeholder="Raio do círculo"> <br>
        <button style="padding: 10px 30px; margin-bottom: 10px; font-size: 18px;" type="button" onclick="area()">calcular</button>
        <h1 style="color: #000000;"  id="resposta"></h1>
    </form>


    
</body>
</html>

<script>
     function area(){
        var raio = document.getElementById("raio").value;
        
        var result = 3.14* (parseFloat(raio) * parseFloat(raio));
        document.getElementById("resposta").innerHTML = 'Resultado = ' + result;
    }
</script>
