<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body style="background-color: #4e3372;">
    <!-- 2) Escreva um programa para ler uma temperatura em graus Fahrenheit, calcular e escrever o valor
correspondente em graus Celsius. (C = (F-32) * 5 / 9) -->

    <form action="" >
        <input style="padding: 10px; margin-bottom: 10px; font-size: 40px;"  type="text" placeholder="Fahrenheit" id="tempFahr"> <br>
        <button type="button" style=" padding: 20px; font-size: 20px;" onclick="conversão()">calcular</button>
    </form>
        <h1 id="resposta" style="color: #000000;  font-family: monospace;"></h1>
</body>
</html>

<script>
    function conversão(){
        var Fahr = parseFloat(document.getElementById("tempFahr").value);
        var result = (Fahr - 32) * 5/9
        document.getElementById("resposta").innerHTML = 'Resultado = ' + result;

    }
</script>
